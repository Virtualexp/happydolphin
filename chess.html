<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Chess Archive - Dolphin.corp</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css">
<!-- Injecting chess.js for logic -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script id="tailwind-config">

        "colors": {
                "error-container": "#93000a",
                "surface-container-high": "#2a2a2a",
                "surface-bright": "#393939",
                "on-error": "#690005",
                "inverse-on-surface": "#313030",
                "on-secondary-fixed-variant": "#004b74",
                "outline": "#99907c",
                "surface": "#131313",
                "primary-container": "#d4af37",
                "surface-container-highest": "#353534",
                "secondary-fixed": "#cde5ff",
                "on-background": "#e5e2e1",
                "surface-variant": "#353534",
                "on-primary": "#3c2f00",
                "primary-fixed-dim": "#e9c349",
                "on-error-container": "#ffdad6",
                "surface-container-low": "#1c1b1b",
                "inverse-primary": "#735c00",
                "on-primary-fixed-variant": "#574500",
                "tertiary": "#cecece",
                "background": "#131313",
                "on-surface": "#e5e2e1",
                "surface-tint": "#e9c349",
                "on-secondary-fixed": "#001d32",
                "on-secondary-container": "#eef5ff",
                "on-tertiary": "#2f3131",
                "primary-fixed": "#ffe088",
                "on-tertiary-container": "#444546",
                "secondary": "#94ccff",
                "on-primary-container": "#554300",
                "on-tertiary-fixed-variant": "#454747",
                "surface-container": "#201f1f",
                "inverse-surface": "#e5e2e1",
                "surface-container-lowest": "#0e0e0e",
                "surface-dim": "#131313",
                "on-surface-variant": "#d0c5af",
                "tertiary-fixed-dim": "#c6c6c6",
                "on-secondary": "#003352",
                "error": "#ffb4ab",
                "secondary-fixed-dim": "#94ccff",
                "on-tertiary-fixed": "#1a1c1c",
                "tertiary-container": "#b2b3b3",
                "secondary-container": "#0375b2",
                "outline-variant": "#4d4635",
                "tertiary-fixed": "#e2e2e2",
                "primary": "#f2ca50",
                "on-primary-fixed": "#241a00"
        },
        "borderRadius": {
                "DEFAULT": "0.125rem",
                "lg": "0.25rem",
                "xl": "0.5rem",
                "full": "0.75rem"
        },
        "spacing": {
                "base": "8px",
                "container-max": "1280px",
                "margin-mobile": "16px",
                "gutter": "24px",
                "margin-desktop": "64px"
        },
        "fontFamily": {
                "headline-lg": ["Libre Caslon Text"],
                "label-sm": ["Hanken Grotesk"],
                "headline-lg-mobile": ["Libre Caslon Text"],
                "body-md": ["Source Serif 4"],
                "body-lg": ["Source Serif 4"],
                "display-lg": ["Libre Caslon Text"],
                "label-md": ["Hanken Grotesk"]
        },
        "fontSize": {

                "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "500"}]

      }
    }

</script>
<style>
        .board-square {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: default;
            user-select: none;
            aspect-ratio: 1 / 1;
        }
        .board-square svg {
            width: 80%;
            height: 80%;
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.3));
        }
        .coord-x {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        .coord-y {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            font-weight: 600;
        }
        @media (min-width: 768px) {
            .board-square { font-size: 3rem; }
        }
        body { min-height: max(884px, 100dvh); }
        
        .pgn-move {
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .pgn-move.active {
            font-weight: bold;
        }
        
        /* Disable global touch scaling and hover transforms for this page to prevent window bouncing */
        button:active, .glass-card:active, .glass-card:hover {
            transform: none !important;
        }
        
        /* Layout overrides for ocean background */
        .ocean-bg {
            background: transparent !important;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<!-- Reverted to the original layout with a transparent body to show the ocean background -->
<body class="ocean-bg text-gray-100 min-h-screen pb-24 md:pb-0 transition-colors">
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 glass-nav border-b border-white/10 transition-colors shadow-sm">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop max-w-[640px] mx-auto h-16">
<a href="index.html" class="text-white rounded-full p-2 cursor-pointer flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</a>
<h1 class="font-headline-md text-headline-md font-bold text-[#00f2fe] text-center truncate px-4">Chess Archive</h1>
<div class="w-10"></div>
</div>
</header>
<main class="max-w-7xl mx-auto px-margin-mobile md:px-margin-desktop py-6">

<!-- GAME SELECTOR (Dropdown) -->
<div class="max-w-[640px] mx-auto mb-6">
  <select id="game-selector" class="bg-[#0a0f1c]/60 backdrop-blur-xl border border-white/10 text-white text-sm rounded focus:ring-[#00f2fe] focus:border-[#00f2fe] block w-full p-2.5 shadow-sm transition-colors cursor-pointer outline-none">
    <!-- Options injected by JS -->
  </select>
</div>

<!-- Header Info -->
<div class="text-center mb-8 max-w-[640px] mx-auto">
<div class="bg-[#0a0f1c]/60 backdrop-blur-xl rounded-xl p-4 shadow-sm inline-block w-full border border-white/10">
  <div id="chessgames-header" class="w-full"></div>
</div>
</div>

<!-- Main Content Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 md:gap-12 items-start">
<!-- Left Column: Board & Controls -->
<div class="flex flex-col w-full max-w-[640px] mx-auto md:ml-auto">
<!-- Board -->
<div id="chessboard" class="w-full max-w-[400px] md:max-w-[520px] mx-auto grid grid-cols-8 border-2 border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.5)] rounded overflow-hidden mb-4 transition-colors">
  <!-- Squares will be injected dynamically by JS -->
</div>

<!-- Control Panel -->
<div class="w-full max-w-[400px] md:max-w-[520px] mx-auto flex border border-white/10 rounded overflow-hidden shadow-sm bg-[#0a0f1c]/60 backdrop-blur-xl transition-colors">
<button id="btn-start" class="flex-1 py-3 px-0 w-auto max-w-none rounded-none border-solid border-r border-white/10 flex justify-center items-center">
<span class="material-symbols-outlined text-white">first_page</span>
</button>
<button id="btn-prev" class="flex-1 py-3 px-0 w-auto max-w-none rounded-none border-solid border-r border-white/10 flex justify-center items-center">
<span class="material-symbols-outlined text-white">navigate_before</span>
</button>
<button id="btn-next" class="flex-1 py-3 px-0 w-auto max-w-none rounded-none border-solid border-r border-white/10 flex justify-center items-center">
<span class="material-symbols-outlined text-white">navigate_next</span>
</button>
<button id="btn-end" class="flex-1 py-3 px-0 w-auto max-w-none rounded-none border-solid border-r border-white/10 flex justify-center items-center">
<span class="material-symbols-outlined text-white">last_page</span>
</button>
<button id="btn-flip" class="flex-1 py-3 px-0 w-auto max-w-none rounded-none border-solid flex justify-center items-center">
<span class="material-symbols-outlined text-white">flip_camera_android</span>
</button>
</div>
</div>
<!-- Right Column: Move List & Status -->
<div class="flex flex-col w-full max-w-[640px] mx-auto md:mr-auto h-full">
<!-- Status (Wrapped in white bg for readability) -->
<div class="bg-[#0a0f1c]/60 backdrop-blur-xl border border-white/10 rounded-lg shadow-sm p-3 mb-4">
  <div class="flex justify-between items-center px-2">
  <div class="flex gap-2">
  <div class="flex items-center gap-2 bg-white/10 border border-white/20 px-3 py-1.5 rounded shadow-sm transition-colors">
  <span id="status-color" class="font-label-caps text-label-caps text-gray-300 uppercase">White</span>
  <span id="status-name" class="font-headline-md text-headline-md text-white"></span>
  <span id="status-elo" class="font-body-sm text-body-sm text-gray-400 font-mono"></span>
  </div>
  </div>
  <div class="text-right flex-shrink-0 ml-2">
  <span id="status-turn" class="block font-body-sm text-body-sm text-gray-300"></span>
  <span id="status-last-move" class="block font-notation-table text-notation-table text-[#00f2fe] font-bold"></span>
  </div>
  </div>
</div>
<!-- Move List Container -->
<div class="bg-[#0a0f1c]/60 backdrop-blur-xl border border-white/10 rounded shadow-sm overflow-hidden flex-1 min-h-[300px] transition-colors">
<div id="pgn-container" class="p-4 font-notation-table text-notation-table leading-relaxed text-gray-200 text-justify">
  <!-- PGN is dynamically rendered here -->
</div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden glass-nav border-t border-white/10 fixed bottom-0 w-full z-50 flex justify-around items-center h-16 max-w-[640px] mx-auto transition-colors shadow-[0_-2px_10px_rgba(0,0,0,0.5)]">
<button class="flex flex-col items-center justify-center text-[#00f2fe] rounded-full px-4 py-1 w-auto">
<span class="material-symbols-outlined mb-1 text-xl">chess</span>
<span class="font-label-caps text-label-caps">Play</span>
</button>
<button class="flex flex-col items-center justify-center text-gray-400 px-4 py-1 w-auto">
<span class="material-symbols-outlined mb-1 text-xl">insights</span>
<span class="font-label-caps text-label-caps">Analyze</span>
</button>
<a href="index.html" class="flex flex-col items-center justify-center text-gray-400 px-4 py-1 w-auto">
<span class="material-symbols-outlined mb-1 text-xl">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</a>
</nav>

<!-- Logic Script -->
<script src="chess-app.js"></script>
</body>
</html>
